<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enki — Discover</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="enki/qc.css" />
<link rel="stylesheet" href="enki/views.css" />
<link rel="stylesheet" href="enki/nodes.css" />
<link rel="stylesheet" href="enki/settings.css" />
<style>
/* ════════════════ Enki Design System ════════════════ */
.enki-root{
  --enki-paper:#faf8f4; --enki-paper-2:#f3efe7; --enki-paper-3:#e8e2d6;
  --enki-ink:#1a1715; --enki-ink-2:#3d3a36; --enki-ink-3:#6b665e;
  --enki-rule:#d8d2c5; --enki-rule-2:#ebe5d8; --enki-ember:#c96838;
  --ember-rgb:201,104,56;
  --header-bg:rgba(255,255,255,0.92);
  --qc-bg:#1a1715; --qc-ink:#ffffff;
  --cta-bg:#1a1715; --cta-ink:#ffffff;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-serif:'Instrument Serif',Georgia,serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  /* repo font-var aliases so ported Enki CSS resolves identically */
  --font-inter:'Inter',system-ui,sans-serif;
  --font-geist-sans:'Geist',system-ui,sans-serif;
  --font-instrument-serif:'Instrument Serif',Georgia,serif;
  --font-brand:'Instrument Serif',Georgia,serif;
  --font-jetbrains-mono:'JetBrains Mono',ui-monospace,monospace;
}
.enki-root.dark{
  --enki-paper:#0a1825; --enki-paper-2:#102433; --enki-paper-3:#16303f;
  --enki-ink:#e4edf1; --enki-ink-2:#97aebb; --enki-ink-3:#6a8493;
  --enki-rule:#1e3849; --enki-rule-2:#2a4658; --enki-ember:#cba24a;
  --ember-rgb:203,162,74;
  --header-bg:rgba(10,24,37,0.92);
  --qc-bg:#f0a868; --qc-ink:#3a2410;
  --cta-bg:linear-gradient(135deg,#cba24a 0%,#b8862f 100%); --cta-ink:#0a1825;
}
.enki-root.dark.theme-purple{
  --enki-paper:#140e1f; --enki-paper-2:#1c1330; --enki-paper-3:#241a37;
  --enki-ink:#ece8f5; --enki-ink-2:#a99fc0; --enki-ink-3:#7d7295;
  --enki-rule:#2e2442; --enki-rule-2:#3d3154; --enki-ember:#a855f7;
  --ember-rgb:168,85,247;
  --header-bg:rgba(20,14,32,0.92);
  --qc-bg:#8b5cf6; --qc-ink:#ffffff;
  --cta-bg:linear-gradient(135deg,#8b5cf6 0%,#6d28d9 100%); --cta-ink:#ffffff;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-sans);
  background:var(--enki-paper);
  color:var(--enki-ink);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
.enki-root{min-height:100vh;background:var(--enki-paper);color:var(--enki-ink);transition:background-color .4s ease,color .4s ease;}
.serif{font-family:var(--font-serif);}
.mono{font-family:var(--font-mono);}
button{font-family:inherit;cursor:pointer;}
img{display:block;}

::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:color-mix(in oklab,var(--enki-ink-3) 40%,transparent);border-radius:999px;border:3px solid transparent;background-clip:content-box;}
::-webkit-scrollbar-thumb:hover{background:color-mix(in oklab,var(--enki-ink-3) 70%,transparent);background-clip:content-box;}

/* ════════════════ Layout ════════════════ */
.ek-shell{display:flex;min-height:100vh;}
.ek-sidebar{
  position:fixed;top:0;left:0;bottom:0;z-index:120;
  width:256px;
  display:flex;flex-direction:column;
  padding:18px 14px 22px;
  background:var(--enki-paper);
  border-right:1px solid var(--enki-rule);
  transition:width .26s cubic-bezier(.4,0,.2,1);
}
.ek-root--rail .ek-sidebar{width:78px;align-items:center;padding-left:0;padding-right:0;}
.ek-main{flex:1;min-width:0;margin-left:256px;transition:margin-left .26s cubic-bezier(.4,0,.2,1);position:relative;}
.ek-root--rail .ek-main{margin-left:78px;}

/* ── Sidebar logo ── */
.ek-logo{
  display:flex;align-items:center;gap:7px;height:48px;padding:0 10px;margin-bottom:10px;
  cursor:pointer;flex-shrink:0;text-decoration:none;
}
.ek-root--rail .ek-logo{justify-content:center;padding:0;}
.ek-logo-img{height:34px;width:auto;display:block;object-fit:contain;}
.theme-purple .ek-logo-img{filter:hue-rotate(8deg);}

/* ── Collapse toggle (right edge of sidebar) ── */
.ek-collapse-btn{
  position:absolute;top:74px;right:-13px;z-index:130;
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--enki-paper);border:1px solid var(--enki-rule);color:var(--enki-ink-2);
  box-shadow:0 2px 8px rgba(0,0,0,.12);transition:all .16s ease;opacity:.55;
}
.ek-sidebar:hover .ek-collapse-btn{opacity:1;}
.ek-collapse-btn:hover{color:var(--enki-ember);border-color:var(--enki-ember);transform:scale(1.08);}
.ek-logo-mark{
  width:40px;height:40px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--cta-bg);color:var(--cta-ink);
  font-family:var(--font-serif);font-style:italic;font-size:24px;line-height:1;
  box-shadow:0 4px 14px rgba(var(--ember-rgb),.28);
}
.ek-logo-word{font-family:var(--font-serif);font-style:italic;font-size:27px;letter-spacing:-.01em;color:var(--enki-ink);white-space:nowrap;}
.ek-logo-dot{color:var(--enki-ember);font-size:22px;}

/* ── Nav items ── */
.ek-nav{display:flex;flex-direction:column;gap:3px;margin-top:4px;}
.ek-nav-item{
  position:relative;display:flex;align-items:center;gap:16px;
  height:50px;padding:0 14px;border:none;border-radius:999px;background:none;
  color:var(--enki-ink);font-size:18px;font-weight:400;width:100%;text-align:left;
  transition:background .16s ease,color .16s ease;white-space:nowrap;
}
.ek-root--rail .ek-nav-item{width:50px;height:50px;padding:0;justify-content:center;gap:0;border-radius:50%;margin:0 auto;}
.ek-nav-item:hover{background:color-mix(in oklab,var(--enki-ink) 7%,transparent);}
.ek-nav-item.active{font-weight:600;}
.ek-nav-item.active .ek-nav-ico{color:var(--enki-ember);}
.ek-nav-ico{display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--enki-ink);}
.ek-nav-label{flex:1;}
.ek-root--rail .ek-nav-label{display:none;}
.ek-nav-badge{
  min-width:20px;height:20px;padding:0 6px;border-radius:999px;
  background:var(--enki-ember);color:#fff;font-size:11px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);
}
.ek-root--rail .ek-nav-badge{position:absolute;top:4px;right:4px;min-width:16px;height:16px;font-size:9px;padding:0 4px;}

/* tooltip when railed */
.ek-nav-tip{
  position:absolute;left:64px;top:50%;transform:translateY(-50%) scale(.92);
  background:var(--enki-ink);color:var(--enki-paper);
  padding:6px 11px;border-radius:7px;font-size:13px;font-weight:500;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .14s ease,transform .14s ease;z-index:200;
  box-shadow:0 6px 18px rgba(0,0,0,.22);
}
.ek-nav-tip::before{content:'';position:absolute;left:-4px;top:50%;transform:translateY(-50%) rotate(45deg);width:8px;height:8px;background:var(--enki-ink);}
.ek-root--rail .ek-nav-item:hover .ek-nav-tip{opacity:1;transform:translateY(-50%) scale(1);}

/* ── Create Prompt CTA ── */
.ek-create{
  display:flex;align-items:center;justify-content:center;gap:9px;
  height:54px;margin:16px 4px 0;border:none;border-radius:999px;
  background:var(--cta-bg);color:var(--cta-ink);
  font-size:16px;font-weight:600;letter-spacing:.01em;width:calc(100% - 8px);
  box-shadow:0 6px 18px rgba(var(--ember-rgb),.32);
  transition:transform .18s ease,box-shadow .18s ease,filter .18s ease;
}
.ek-create:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(var(--ember-rgb),.42);filter:brightness(1.04);}
.ek-create:active{transform:translateY(0) scale(.98);}
.ek-create{position:relative;}
.ek-create-label{white-space:nowrap;}
.ek-root--rail .ek-create:hover .ek-nav-tip{opacity:1;transform:translateY(-50%) scale(1);}
.ek-root--rail .ek-create{width:54px;height:54px;padding:0;margin:16px auto 0;}
.ek-root--rail .ek-create .ek-create-label{display:none;}
.ek-create2{height:46px;margin-top:9px;background:transparent;color:var(--enki-ink);border:1px solid var(--enki-rule);box-shadow:none;font-size:14.5px;}
.ek-create2:hover{background:color-mix(in oklab,var(--enki-ink) 6%,transparent);border-color:var(--enki-ink-3);box-shadow:none;filter:none;}
.ek-create2 .ek-create-label{font-weight:600;}
.ek-root--rail .ek-create2{width:54px;height:48px;padding:0;margin:9px auto 0;}
.ek-root--rail .ek-create2 .ek-create-label{display:none;}
.ek-root--rail .ek-create2:hover .ek-nav-tip{opacity:1;transform:translateY(-50%) scale(1);}

.ek-side-spacer{flex:1;}

/* ── Sidebar footer (account) ── */
.ek-account{
  display:flex;align-items:center;gap:11px;margin-top:14px;padding:8px 10px;border-radius:999px;
  transition:background .16s ease;
}
.ek-account:hover{background:color-mix(in oklab,var(--enki-ink) 7%,transparent);}
.ek-root--rail .ek-account{justify-content:center;padding:6px 0;}
.ek-avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:var(--cta-bg);color:var(--cta-ink);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:13px;font-weight:600;
}
.ek-account-info{min-width:0;flex:1;}
.ek-account-nrow{display:flex;align-items:center;gap:7px;min-width:0;}
.ek-account-nametext{font-size:14px;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.ek-root--rail .ek-account-info,.ek-root--rail .ek-account-more{display:none;}
.ek-account-name{font-size:14px;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ek-account-handle{font-size:12px;color:var(--enki-ink-3);font-family:var(--font-mono);}
.ek-account-more{margin-left:auto;color:var(--enki-ink-3);}

/* ════════════════ Top Bar ════════════════ */
.ek-topbar{
  position:fixed;top:0;right:0;left:256px;z-index:90;
  background:var(--header-bg);
  backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
  border-bottom:1px solid var(--enki-rule);
  transition:transform .32s cubic-bezier(.4,0,.2,1),left .26s cubic-bezier(.4,0,.2,1);
}
.ek-root--rail .ek-topbar{left:78px;}
.ek-topbar--hidden{transform:translateY(-100%);}
.ek-topbar-row1{display:flex;align-items:center;gap:14px;padding:11px 26px 0;min-width:0;}
.ek-topbar-row2{display:flex;align-items:center;gap:2px;padding:0 26px;height:46px;overflow-x:auto;scrollbar-width:none;}
.ek-topbar-row2::-webkit-scrollbar{display:none;}

/* generator segmented */
.ek-genlabel{font-family:var(--font-mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--enki-ink-3);flex-shrink:0;}
/* generator dropdown */
.ek-gendd{position:relative;flex-shrink:0;}
.ek-gendd-btn{display:flex;align-items:center;gap:9px;height:40px;padding:0 13px;border-radius:10px;border:1px solid var(--enki-rule);background:var(--enki-paper-2);color:var(--enki-ink);font-size:13.5px;font-weight:500;font-family:var(--font-sans);min-width:172px;transition:border-color .16s ease;}
.ek-gendd-btn:hover{border-color:var(--enki-ink-3);}
.ek-gendd-btn.open{border-color:var(--enki-ember);box-shadow:0 0 0 3px rgba(var(--ember-rgb),.12);}
.ek-gendd-val{flex:1;text-align:left;}
.ek-gendd-menu{position:absolute;top:48px;left:0;min-width:230px;z-index:120;background:var(--enki-paper);border:1px solid var(--enki-rule);border-radius:12px;box-shadow:0 16px 44px rgba(0,0,0,.22);padding:6px;display:flex;flex-direction:column;gap:2px;animation:ek-dd-in .16s ease;}
@keyframes ek-dd-in{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.ek-gendd-item{display:flex;align-items:center;gap:10px;height:40px;padding:0 12px;border:none;background:none;border-radius:8px;color:var(--enki-ink);font-size:13.5px;font-weight:500;text-align:left;font-family:var(--font-sans);transition:background .14s ease;}
.ek-gendd-item .ek-gen-dot{background:var(--enki-ink-3);}
.ek-gendd-item:hover{background:color-mix(in oklab,var(--enki-ink) 7%,transparent);}
.ek-gendd-item.active{background:color-mix(in oklab,var(--enki-ember) 13%,transparent);color:var(--enki-ink);}
.ek-gendd-item.active .ek-gen-dot{background:var(--enki-ember);box-shadow:0 0 8px rgba(var(--ember-rgb),.7);}
.ek-gens{display:flex;gap:6px;flex-shrink:0;}
.ek-gen{
  display:flex;align-items:center;gap:8px;height:38px;padding:0 14px;border-radius:10px;
  border:1px solid var(--enki-rule);background:var(--enki-paper-2);color:var(--enki-ink-2);
  font-size:13px;font-weight:500;white-space:nowrap;transition:all .16s ease;
}
.ek-gen:hover{border-color:color-mix(in oklab,var(--enki-ember) 50%,var(--enki-rule));color:var(--enki-ink);}
.ek-gen.active{
  border-color:var(--enki-ember);color:var(--enki-ink);
  background:color-mix(in oklab,var(--enki-ember) 12%,var(--enki-paper-2));
  box-shadow:inset 0 0 0 1px rgba(var(--ember-rgb),.35);
}
.ek-gen-dot{width:7px;height:7px;border-radius:50%;background:var(--enki-ink-3);flex-shrink:0;}
.ek-gen.active .ek-gen-dot{background:var(--enki-ember);box-shadow:0 0 8px rgba(var(--ember-rgb),.7);}

/* search */
.ek-search{
  display:flex;align-items:center;gap:10px;flex:1 1 auto;min-width:120px;max-width:460px;height:40px;padding:0 14px;
  border:1px solid var(--enki-rule);border-radius:999px;background:var(--enki-paper-2);
  transition:border-color .16s ease,box-shadow .16s ease;
}
.ek-search:focus-within{border-color:var(--enki-ember);box-shadow:0 0 0 3px rgba(var(--ember-rgb),.14);}
.ek-search input{flex:1;background:none;border:none;outline:none;font-size:14px;color:var(--enki-ink);font-family:var(--font-sans);}
.ek-search input::placeholder{color:var(--enki-ink-3);}
.ek-kbd{font-family:var(--font-mono);font-size:10px;color:var(--enki-ink-3);border:1px solid var(--enki-rule);border-radius:4px;padding:2px 5px;}

.ek-sort{
  display:flex;align-items:center;gap:7px;height:40px;padding:0 14px;flex-shrink:0;
  border:1px solid var(--enki-rule);border-radius:10px;background:var(--enki-paper-2);
  color:var(--enki-ink-2);font-size:13px;font-weight:500;
}
.ek-sort:hover{color:var(--enki-ink);border-color:var(--enki-ink-3);}
.ek-sort-label{white-space:nowrap;}
@media(max-width:1080px){.ek-sort-label{display:none;}}

/* category chips (row 2) */
.ek-cat{
  flex:0 0 auto;height:46px;padding:0 15px;border:none;background:none;font-family:var(--font-geist-sans);
  color:var(--enki-ink-3);font-size:12.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  border-bottom:2px solid transparent;transition:color .15s ease,border-color .15s ease;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.ek-cat:hover{color:var(--enki-ink);}
.ek-cat.active{color:var(--enki-ink);border-bottom-color:var(--enki-ember);}
.ek-cat-divider{width:1px;height:18px;background:var(--enki-rule);margin:0 6px;flex-shrink:0;}

/* ════════════════ Feed ════════════════ */
.ek-feed{padding:128px 26px 120px;}
.ek-masonry{column-count:4;column-gap:14px;}
@media(max-width:1480px){.ek-masonry{column-count:4;}}
@media(max-width:1240px){.ek-masonry{column-count:3;}}
@media(max-width:820px){.ek-masonry{column-count:2;}}

.ek-card{
  break-inside:avoid;display:block;width:100%;margin-bottom:14px;position:relative;
  border-radius:8px;overflow:hidden;cursor:pointer;background:var(--enki-paper-3);
  box-shadow:0 2px 10px rgba(0,0,0,.06);
  transition:transform .25s cubic-bezier(.16,1,.3,1),box-shadow .25s cubic-bezier(.16,1,.3,1);
}
.dark .ek-card{box-shadow:0 4px 20px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.05);}
.ek-card:hover{transform:translateY(-4px);box-shadow:0 16px 34px rgba(0,0,0,.13);}
.dark .ek-card:hover{box-shadow:0 14px 44px rgba(0,0,0,.55);}
.ek-card-img{position:relative;overflow:hidden;background:var(--enki-paper-3);}
.ek-card-img img{width:100%;height:auto;display:block;transition:transform .35s ease;}
.ek-card:hover .ek-card-img img{transform:scale(1.04);}
.ek-card-badge{
  position:absolute;top:9px;left:9px;z-index:2;display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.9);color:#1a1715;font-family:var(--font-mono);font-size:9px;
  letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border-radius:3px;backdrop-filter:blur(6px);
}
.ek-card-gen{
  position:absolute;top:9px;right:46px;z-index:2;display:inline-flex;align-items:center;gap:4px;
  background:rgba(0,0,0,.55);color:#fff;font-family:var(--font-mono);font-size:9px;letter-spacing:.04em;
  padding:3px 7px;border-radius:3px;backdrop-filter:blur(6px);opacity:0;transition:opacity .16s ease;
}
.ek-card:hover .ek-card-gen{opacity:1;}
.ek-heart{
  position:absolute;top:8px;right:8px;z-index:3;width:30px;height:30px;border:0;border-radius:6px;
  background:rgba(255,255,255,.9);color:#3d3a36;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);transition:background .15s,color .15s,transform .15s;
}
.ek-heart:hover{transform:scale(1.08);}
.ek-heart.active{color:var(--enki-ember);}
.ek-video-icon{
  position:absolute;right:12px;bottom:12px;z-index:3;width:40px;height:40px;border-radius:999px;
  background:rgba(0,0,0,.55);color:#fff;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);
}
.ek-card-overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;
  color:#fff;background:linear-gradient(180deg,transparent 35%,rgba(0,0,0,.45) 62%,rgba(0,0,0,.86) 100%);
  opacity:0;transition:opacity .18s ease;
}
.ek-card:hover .ek-card-overlay{opacity:1;}
.ek-card-otitle{font-family:var(--font-serif);font-size:18px;line-height:1.18;text-shadow:0 1px 3px rgba(0,0,0,.5);}
.ek-card-oartist{font-family:var(--font-mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.82);margin-top:3px;}
.ek-card-ostats{display:flex;gap:12px;margin-top:8px;font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,.78);}
.ek-card-ostats span{display:flex;align-items:center;gap:4px;}

.ek-skel{break-inside:avoid;width:100%;margin-bottom:14px;border-radius:8px;background:linear-gradient(110deg,var(--enki-paper-2) 8%,var(--enki-paper-3) 18%,var(--enki-paper-2) 33%);background-size:200% 100%;animation:ek-shimmer 1.4s linear infinite;}
@keyframes ek-shimmer{to{background-position-x:-200%;}}

/* ════════════════ Detail View ════════════════ */
.ek-detail{position:fixed;inset:0 0 0 256px;z-index:100;background:var(--enki-paper);display:flex;flex-direction:column;transition:left .26s;}
.ek-root--rail .ek-detail{left:78px;}
.ek-detail-top{
  display:flex;align-items:center;gap:14px;height:60px;padding:0 24px;flex-shrink:0;
  border-bottom:1px solid var(--enki-rule);background:var(--header-bg);
  backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
}
